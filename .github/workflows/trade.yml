name: Live Trading Strategy

on:
  schedule:
    # Runs at minute 1 and 31 past every hour on weekdays (Mon-Fri)
    # The 1-minute delay ensures API data is populated for the previous 30m window
    - cron: '1,31 * * * 1-5'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Live Trades
      env:
        ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
        ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      run: |
        python src/live_trader.py
