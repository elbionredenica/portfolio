name: Alpaca Paper Trading

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14-20 * * 1-5" # 9:30am-3:30pm ET (UTC-5) weekdays
    - cron: "0 21 * * 1-5"    # 4:00pm ET (UTC-5) weekdays

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run manual trade script
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: |
          python src/trade.py --side buy --symbol AAPL --qty 1
