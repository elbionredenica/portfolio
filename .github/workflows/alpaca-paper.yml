name: Alpaca Paper Trading (Price Check)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * 1-5" # hourly weekdays

jobs:
  price_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run price check
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          DEFAULT_SYMBOL: ${{ secrets.DEFAULT_SYMBOL }}
        run: |
          python src/price_check.py
